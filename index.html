<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Mi Selección</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <meta name="description" contAent="Elige a tus 26 favoritos para representar a Argentina en el Mundial 2026.">
</head>

<body>

    <header>
        <div class="title-container">
            <h1><span>LA PRE-LISTA DE</span>SCALONI</h1>
            <p class="instruction">Ponete el traje del DT de la Selecicón Argentina y elegí a los 26 jugadores que
                llevarías al Mundial 2026</p>
            <div id="selection-counter" class="selection-badge">0 / 26 Jugadores</div>
        </div>
    </header>

    <main class="container">
        <div id="players-list">
            <!-- Los jugadores se cargarán dinámicamente -->
        </div>
    </main>

    <footer class="footer-cta">
        <button id="confirm-btn" class="confirm-btn" disabled>Faltan 26</button>
    </footer>

    <!-- Modal de Confirmación -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Tu Selección</h2>
            <div id="modal-list" class="modal-list"></div>
            <div class="email-section">
                <label for="user-email">TU CORREO PARA VOTAR</label>
                <input type="email" id="user-email" placeholder="ejemplo@correo.com" required>
                <div id="error-msg" class="error-msg"></div>
            </div>
            <button id="final-confirm" class="final-confirm-btn">Confirmar y Votar</button>
            <button id="close-modal" class="close-modal">Volver a editar</button>
        </div>
    </div>

    <!-- Pantalla de Éxito -->
    <div id="success-screen" class="success-screen" style="display:none;">
        <div class="success-content">
            <div class="success-icon">🏆</div>
            <h2>¡Voto Registrado!</h2>
            <p>Tu selección para el Mundial 2026 ha sido guardada correctamente.</p>
            <div class="success-actions">
                <button onclick="window.location.href='stats.html'" class="stats-btn">Ver qué votaron los
                    lectores</button>
                <button onclick="location.reload()" class="back-link">Volver a votar</button>
            </div>
        </div>
    </div>

    <script src="players_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
